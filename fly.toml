# Fly.io configuration. Change `app` to a unique name (or let `fly launch` set it).
# Deploy: fly launch --no-deploy  →  fly volumes create weekly_data --size 1  →  fly deploy
app = "weekly-report"
primary_region = "cdg" # Paris — change to the closest region

[build]
# Uses the repo Dockerfile (Node + LibreOffice + standalone server).

[http_service]
internal_port = 3000
force_https = true
# Scale to zero when idle to keep costs minimal (cold start on next request).
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0

# Persistent disk for the SQLite database (DATABASE_PATH=/app/data/reports.db).
[[mounts]]
source = "weekly_data"
destination = "/app/data"

# LibreOffice needs memory during conversion — 1 GB is a safe floor.
[[vm]]
size = "shared-cpu-1x"
memory = "1gb"

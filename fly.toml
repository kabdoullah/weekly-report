# fly.toml app configuration file generated for weekly-report on 2026-06-29T22:03:31Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'weekly-report'
primary_region = 'cdg'

[build]

[[mounts]]
  source = 'weekly_data'
  destination = '/app/data'

[http_service]
  internal_port = 3000
  force_https = true
  # Kept always-on (not 'stop') so the in-process Friday-18h auto-send
  # scheduler (src/instrumentation.ts) is reliably running to fire on time.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[env]
  # Server timezone for the Friday-18h auto-send check.
  TZ = 'Africa/Abidjan'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
